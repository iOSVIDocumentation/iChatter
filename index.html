<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChatter — Чат</title>
    <!-- Защитный скрипт: выполняется ДО загрузки всего интерфейса -->
    <script>
        const currentUser = localStorage.getItem('chat_user');
        if (!currentUser || currentUser.trim() === "") {
            window.location.href = '/login';
        }
    </script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* Твои оригинальные стили оформления интерфейса iChatter (iOS 6) */
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #cbd2d9;
            margin: 0;
            padding: 0;
        }
        .header {
            background: linear-gradient(to bottom, #7fa4c7 0%, #4673a3 100%);
            color: white;
            text-align: center;
            padding: 10px;
            font-weight: bold;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.4);
        }
        .chat-container {
            display: flex;
            height: calc(100vh - 40px);
        }
        .sidebar {
            width: 250px;
            background: #fff;
            border-right: 1px solid #ababab;
        }
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5e5e5;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .input-area {
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ababab;
            display: flex;
        }
        .input-area input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .input-area button {
            margin-left: 10px;
            padding: 8px 15px;
            background: #4673a3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">iChatter</div>

<div class="chat-container">
    <div class="sidebar" id="sidebar">
        <div style="padding: 10px; font-weight: bold; border-bottom: 1px solid #eee;">
            Вы: <span id="myUsernameDisplay"></span>
        </div>
        <!-- Список чатов -->
    </div>
    <div class="main-chat">
        <div class="messages" id="messagesBox">
            <!-- Сообщения появятся тут -->
        </div>
        <div class="input-area">
            <input type="text" id="msgInput" placeholder="Ваше сообщение...">
            <button id="sendBtn">Отпр.</button>
        </div>
    </div>
</div>

<script>
    // Основная логика работы мессенджера iChatter через Socket.io
    document.getElementById('myUsernameDisplay').textContent = currentUser;

    const socket = io({ query: { r: Date.now() } });

    socket.on('connect', () => {
        console.log('Подключено к серверу!');
        // Отправляем пинг для синхронизации онлайна
        socket.emit('online_ping', { username: currentUser });
    });

    socket.on('connect_error', () => {
        alert('Ошибка связи с WebSocket сервером.');
    });

    // Твоя остальная логика обработки событий чата:
    // (socket.on('chat_message'), socket.on('restore_chats') и т.д.)
</script>
</body>
</html>
