<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChatter - Вход</title>
    <style>
        body { background-color: #4a545d; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .login-box { background: #3b434a; padding: 20px; border-radius: 8px; width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: none; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-size: 14px; }
        button:hover { background: #34495e; }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; background: #556069; color: white; cursor: pointer; border: 1px solid #3b434a; }
        .tab.active { background: #3b434a; font-weight: bold; }
        #code-section { display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="tabs">
            <div class="tab active" onclick="setMode('login')">Вход</div>
            <div class="tab" onclick="setMode('register')">Регистрация</div>
        </div>
        
        <div id="main-section">
            <input type="text" id="username" placeholder="Имя пользователя (для реги)" style="display: none;">
            <input type="email" id="email" placeholder="1rol4k2@gmail.com">
            <input type="password" id="password" placeholder="Пароль">
            <button onclick="sendAuthCode()">Войти и получить код</button>
        </div>

        <div id="code-section">
            <input type="text" id="code" placeholder="Введите код из почты">
            <button onclick="verifyAuthCode()">Подтвердить</button>
        </div>

        <div id="error-msg" class="error"></div>
    </div>

    <script>
        const API_BASE = 'https://moss-perspective-stands-copying.trycloudflare.com';
        let currentMode = 'login';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('username').style.display = (mode === 'register') ? 'block' : 'none';
            document.getElementById('error-msg').innerText = '';
        }

        async function sendAuthCode() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const username = document.getElementById('username').value;
            const errorMsg = document.getElementById('error-msg');

            errorMsg.innerText = 'Отправка...';

            try {
                const response = await fetch(`${API_BASE}/api/send-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, username, mode: currentMode })
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('main-section').style.display = 'none';
                    document.getElementById('code-section').style.display = 'block';
                    document.querySelector('.tabs').style.display = 'none';
                    errorMsg.innerText = '';
                } else {
                    errorMsg.innerText = data.error || 'Ошибка отправки';
                }
            } catch (err) {
                errorMsg.innerText = 'Ошибка ответа бэкенда. Проверь туннель!';
            }
        }

        async function verifyAuthCode() {
            const email = document.getElementById('email').value;
            const code = document.getElementById('code').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch(`${API_BASE}/api/verify-code`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, code })
                });
                const data = await response.json();
                
                if (data.success) {
                    // ЛОГИКА ТОКЕНА: переходим на страницу чата и пишем токен в URL
                    window.location.href = 'chat.html?token=' + data.token;
                } else {
                    errorMsg.innerText = data.error || 'Неверный код';
                }
            } catch (err) {
                errorMsg.innerText = 'Ошибка соединения с сервером';
            }
        }
    </script>
</body>
</html>
