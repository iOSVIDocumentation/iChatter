<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter</title>
    <!-- Если этот socket.io.js не сработает в iOS 6, напиши, дадим ссылку на версию 2.x -->
    <script src="https://moss-perspective-stands-copying.trycloudflare.com/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #E2E7ED; font-family: Helvetica, sans-serif; overflow: hidden; }
        
        /* Жесткая привязка координат для iOS 6 */
        #messages { 
            position: absolute; 
            top: 0; 
            bottom: 50px; 
            left: 0; 
            right: 0; 
            padding: 10px; 
            overflow-y: scroll; 
            -webkit-overflow-scrolling: touch; /* Плавный скролл для старого WebKit */
            box-sizing: border-box;
        }
        
        .msg { padding: 10px; background: white; margin-bottom: 8px; border-radius: 10px; word-wrap: break-word; }
        
        #form-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #cbd2d9;
            box-sizing: border-box;
            padding: 5px;
        }
        
        #form { display: block; width: 100%; height: 100%; margin: 0; }
        
        /* Позиционирование инпута и кнопки без Flexbox */
        #input { 
            position: absolute;
            left: 5px;
            top: 5px;
            bottom: 5px;
            right: 80px;
            width: auto;
            box-sizing: border-box;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
            padding: 5px;
        }
        
        #send-btn {
            position: absolute;
            right: 5px;
            top: 5px;
            bottom: 5px;
            width: 70px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div id="form-container">
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Сообщение...">
            <button type="submit" id="send-btn">Отпр.</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
