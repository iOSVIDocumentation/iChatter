<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <style>
        body { background-color: #4A525A; font-family: "Helvetica Neue", sans-serif; color: #fff; margin: 0; display: flex; height: 100vh; }
        .light-theme { background-color: #f0f0f0 !important; color: #000 !important; }
        
        #sidebar { width: 300px; background-color: #383E44; border-right: 1px solid #2B3035; display: flex; flex-direction: column; }
        .chat-item { padding: 15px; border-bottom: 1px solid #2B3035; cursor: pointer; }
        
        #chat-area { flex: 1; display: none; flex-direction: column; }
        .my-msg { background-color: #1F2D3D; padding: 10px; border-radius: 6px; margin: 5px; color: #fff; }
        
        /* Стили для всех модальных окон */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal-box { margin: 100px auto; width: 300px; background: #383E44; padding: 20px; border-radius: 12px; color: #fff; text-align: center; }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; box-sizing: border-box; background: #5B646E; border: none; color: #fff; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #1F2D3D; color: #fff; border: none; border-radius: 5px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding:10px;">
        <button onclick="openSettings()">⚙️</button>
        <button onclick="showCustomPrompt()">🔍 ID</button>
    </div>
    <div id="chats-list"></div>
</div>

<div id="chat-area">
    <div id="chat-title" style="padding:10px; font-weight:bold;"></div>
    <ul id="messages" style="list-style: none; padding: 0;"></ul>
    <form id="form" style="padding:10px;">
        <input type="text" id="input" placeholder="Сообщение...">
        <button type="submit">Отправить</button>
    </form>
</div>

<!-- Универсальное модальное окно для ввода (вместо prompt) -->
<div id="custom-prompt-modal" class="modal-overlay">
    <div class="modal-box">
        <p>Введите ID пользователя:</p>
        <input type="text" id="prompt-input">
        <button onclick="submitPrompt()">OK</button>
        <button onclick="hideModal('custom-prompt-modal')">Отмена</button>
    </div>
</div>

<!-- Окно настроек -->
<div id="settings-modal" class="modal-overlay">
    <div class="modal-box">
        <h3>Настройки</h3>
        <p>Ваш ID: <strong id="display-my-id"></strong></p>
        <input type="text" id="profile-name" placeholder="Имя">
        <select id="theme-select" onchange="toggleTheme()">
            <option value="dark">Темная тема</option>
            <option value="light">Светлая тема</option>
        </select>
        <button onclick="saveSettings()">Сохранить</button>
        <button onclick="hideModal('settings-modal')">Закрыть</button>
    </div>
</div>

<script>
    let myUserID = localStorage.getItem('userId') || Math.random().toString(36).substr(2, 9);
    localStorage.setItem('userId', myUserID);

    // Функции окон
    function showCustomPrompt() { document.getElementById('custom-prompt-modal').style.display = 'block'; }
    function openSettings() { 
        document.getElementById('settings-modal').style.display = 'block'; 
        document.getElementById('display-my-id').innerText = myUserID;
    }
    function hideModal(id) { document.getElementById(id).style.display = 'none'; }

    function submitPrompt() {
        let id = document.getElementById('prompt-input').value;
        if (id) alert("Поиск ID: " + id);
        hideModal('custom-prompt-modal');
    }

    function saveSettings() {
        localStorage.setItem('username', document.getElementById('profile-name').value);
        alert("Сохранено!");
        hideModal('settings-modal');
    }

    function toggleTheme() {
        let theme = document.getElementById('theme-select').value;
        document.body.className = (theme === 'light') ? 'light-theme' : '';
    }
</script>

</body>
</html>
