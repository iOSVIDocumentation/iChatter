<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* CSS для iOS 6 */
        html, body { height: 100%; margin: 0; padding: 0; background-color: #4A525A; color: #fff; font-family: Helvetica; }
        
        #container { display: -webkit-box; width: 100%; height: 100%; }
        #sidebar { width: 300px; background-color: #383E44; border-right: 1px solid #2B3035; }
        
        /* Кнопки */
        .btn-ios { padding: 10px; margin: 5px; background: #1F2D3D; color: #fff; border: 1px solid #000; cursor: pointer; display: inline-block; }
        
        /* Модальные окна (старый метод) */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: rgba(0,0,0,0.5); }
        .modal-box { margin: 50px auto; width: 250px; background: #383E44; padding: 20px; border-radius: 10px; border: 1px solid #fff; }
        
        input { width: 230px; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>

<div id="container">
    <div id="sidebar">
        <div style="padding:10px;">
            <button class="btn-ios" id="btn-settings">⚙️</button>
            <button class="btn-ios" id="btn-id">🔍 ID</button>
        </div>
        <div id="chats-list"></div>
    </div>
</div>

<!-- Модальные окна -->
<div id="settings-modal" class="modal">
    <div class="modal-box">
        <h3>Настройки</h3>
        <p>Ваш ID: <span id="my-id-text"></span></p>
        <input type="text" id="input-name" placeholder="Имя">
        <button class="btn-ios" id="btn-save">Сохранить</button>
        <button class="btn-ios" id="btn-close-set">Закрыть</button>
    </div>
</div>

<script>
    // 1. Генерируем уникальный ID для каждого пользователя
    var myUserID = localStorage.getItem('userId');
    if (!myUserID) {
        myUserID = 'User_' + Math.floor(Math.random() * 10000);
        localStorage.setItem('userId', myUserID);
    }

    // 2. Обработчики событий (iOS 6 любит старый синтаксис)
    document.getElementById('btn-settings').onclick = function() {
        document.getElementById('settings-modal').style.display = 'block';
        document.getElementById('my-id-text').innerHTML = myUserID;
    };

    document.getElementById('btn-close-set').onclick = function() {
        document.getElementById('settings-modal').style.display = 'none';
    };

    document.getElementById('btn-id').onclick = function() {
        var id = prompt("Введите ID пользователя:");
        if (id) alert("Поиск ID: " + id);
    };

    document.getElementById('btn-save').onclick = function() {
        var name = document.getElementById('input-name').value;
        localStorage.setItem('username', name);
        alert("Сохранено!");
        document.getElementById('settings-modal').style.display = 'none';
    };
</script>

</body>
</html>
