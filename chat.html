<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter - Чат</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* Стиль как в login.html */
        body {
            background-color: #4A525A !important;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important;
            color: #FFFFFF !important;
            display: -webkit-box;
            height: 100vh;
        }

        #sidebar {
            width: 300px;
            background-color: #383E44 !important;
            border-right: 1px solid #2B3035 !important;
            display: -webkit-box;
            -webkit-box-orient: vertical;
        }

        #chat-area {
            -webkit-box-flex: 1;
            background-color: #4A525A !important;
            display: none;
            -webkit-box-orient: vertical;
        }

        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #2B3035 !important;
            cursor: pointer;
            background-color: #383E44 !important;
        }

        .chat-item.active {
            background-color: #5B646E !important;
        }

        #messages {
            -webkit-box-flex: 1;
            overflow-y: scroll;
            list-style: none;
            padding: 10px;
        }

        .my-msg {
            background-color: #1F2D3D !important;
            padding: 10px;
            border-radius: 6px;
            margin: 5px;
            color: #FFFFFF !important;
        }

        input {
            background-color: #5B646E !important;
            border: 1px solid #3A4045 !important;
            color: #FFFFFF !important;
            padding: 10px;
            border-radius: 4px;
        }

        button {
            background-color: #1F2D3D !important;
            color: #A4B3C6 !important;
            border: 1px solid #141D27 !important;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body id="main-body">

    <!-- Сайдбар -->
    <div id="sidebar">
        <div style="padding: 10px;">
            <button id="search-toggle-btn">🔍</button>
            <button id="settings-toggle-btn">⚙️</button>
        </div>
        <div id="chats-list"></div>
    </div>

    <!-- Окно чата -->
    <div id="chat-area">
        <div id="chat-title" style="padding: 10px; font-weight: bold;"></div>
        <ul id="messages"></ul>
        <form id="form" style="padding: 10px;">
            <input type="text" id="input" placeholder="Сообщение...">
            <button type="submit">Отправить</button>
        </form>
    </div>

    <!-- Заглушка если чат не выбран -->
    <div id="no-chat-placeholder" style="margin: auto;">Выберите чат</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.0/socket.io.js"></script>
    <script>
        var socket = io("https://colour-slowly-complications-trade.trycloudflare.com");
        var myUsername = localStorage.getItem('ichatter_username') || "User";
        var activeDialogs = [];

        document.getElementById('search-toggle-btn').onclick = function() {
            var name = prompt("Имя собеседника:");
            if (name) {
                activeDialogs.push(name);
                renderChats();
            }
        };

        function renderChats() {
            var list = document.getElementById('chats-list');
            list.innerHTML = "";
            activeDialogs.forEach(function(name) {
                var div = document.createElement('div');
                div.className = 'chat-item';
                div.innerText = name;
                div.onclick = function() { startChat(name); };
                list.appendChild(div);
            });
        }

        function startChat(name) {
            document.getElementById('no-chat-placeholder').style.display = 'none';
            document.getElementById('chat-area').style.display = '-webkit-box';
            document.getElementById('chat-title').innerText = name;
        }

        document.getElementById('form').onsubmit = function(e) {
            e.preventDefault();
            var input = document.getElementById('input');
            var li = document.createElement('li');
            li.className = 'my-msg';
            li.innerText = input.value;
            document.getElementById('messages').appendChild(li);
            input.value = '';
        };
    </script>
</body>
</html>
