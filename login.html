<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter - Вход</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        body {
            background-color: #4A525A;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            text-align: center;
        }

        .login-container {
            width: 280px;
            margin: 50px auto 0 auto;
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 8px;
            background-color: #5B646E;
            border: 1px solid #3A4045;
            color: #FFFFFF;
            font-size: 16px;
            border-radius: 4px;
            -webkit-border-radius: 4px;
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
        }

        input::-webkit-input-placeholder {
            color: #A0A5AA;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #1F2D3D;
            border: 1px solid #141D27;
            color: #A4B3C6;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            -webkit-border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:active {
            background-color: #141D27;
        }

        #status-message {
            margin-top: 15px;
            font-size: 14px;
            color: #FF6B6B;
            font-weight: bold;
            display: none;
        }
        
        #status-message.success {
            color: #2ECC71;
        }

        /* Блок ввода кода изначально скрыт средствами CSS */
        #verification-stage {
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- СТАДИЯ 1: Регистрация / Запрос кода -->
        <div id="register-stage">
            <div class="input-group">
                <input type="text" id="username" placeholder="Имя пользователя">
            </div>

            <div class="input-group">
                <input type="text" id="email" placeholder="1rol4k2@gmail.com">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="••••••••••••">
            </div>

            <button type="button" class="btn-submit" id="btn-send">Получить код на почту</button>
        </div>

        <!-- СТАДИЯ 2: Ввод проверочного кода -->
        <div id="verification-stage">
            <div class="input-group">
                <input type="text" id="verify-code" placeholder="Введите 6-значный код">
            </div>
            <button type="button" class="btn-submit" id="btn-verify">Войти в iChatter</button>
        </div>

        <!-- Статусные сообщения -->
        <div id="status-message"></div>

    </div>

    <script>
        var btnSend = document.getElementById('btn-send');
        var btnVerify = document.getElementById('btn-verify');
        var registerStage = document.getElementById('register-stage');
        var verificationStage = document.getElementById('verification-stage');
        var statusMessage = document.getElementById('status-message');

        // Глобальная переменная для сохранения почты между запросами
        var currentEmail = '';

        function showStatus(text, isSuccess) {
            statusMessage.innerText = text;
            statusMessage.style.display = 'block';
            if (isSuccess) {
                statusMessage.className = 'success';
            } else {
                statusMessage.className = '';
            }
        }

        // 1. НАЖАТИЕ: ПОЛУЧИТЬ КОД
        btnSend.onclick = function() {
            var usernameVal = document.getElementById('username').value;
            var emailVal = document.getElementById('email').value;
            var passwordVal = document.getElementById('password').value;

            if (!emailVal) {
                showStatus('Укажите адрес почты', false);
                return;
            }

            currentEmail = emailVal; // Запоминаем почту для следующего шага
            showStatus('Отправка запроса...', true);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', window.location.origin + '/api/send-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var response = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && response.success) {
                            showStatus('Код успешно отправлен на почту!', true);
                            
                            // Переключаем интерфейс: скрываем регистрацию, показываем ввод кода
                            registerStage.style.display = 'none';
                            verificationStage.style.display = 'block';
                        } else {
                            showStatus(response.error || 'Ошибка сервера', false);
                        }
                    } catch(e) {
                        showStatus('Ошибка ответа сервера', false);
                    }
                }
            };

            var data = JSON.stringify({
                username: usernameVal,
                email: emailVal,
                password: passwordVal
            });

            xhr.send(data);
        };

        // 2. НАЖАТИЕ: ПОДТВЕРДИТЬ КОД
        btnVerify.onclick = function() {
            var codeVal = document.getElementById('verify-code').value;

            if (!codeVal) {
                showStatus('Введите полученный код!', false);
                return;
            }

            showStatus('Проверка кода...', true);

            var xhr = new XMLHttpRequest();
            xhr.open('POST', window.location.origin + '/api/verify-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var response = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && response.success) {
                            showStatus('Успешная авторизация! Входим...', true);
                            
                            // Сохраняем сессию (работает и на старых WebKit)
                            if (window.localStorage) {
                                localStorage.setItem('userSession', JSON.stringify(response.user));
                            }
                            
                            // Перенаправление в сам чат после успешного входа
                            setTimeout(function() {
                                window.location.href = 'chat.html';
                            }, 1500);
                        } else {
                            showStatus(response.error || 'Неверный код доступа', false);
                        }
                    } catch(e) {
                        showStatus('Ошибка проверки кода', false);
                    }
                }
            };

            var data = JSON.stringify({
                email: currentEmail,
                code: codeVal
            });

            xhr.send(data);
        };
    </script>

</body>
</html>
