<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter - Вход</title>
    <!-- Правильные мета-теги для старых iPhone/iPad, чтобы не зумило экран -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <style>
        /* Старые стили, которые гарантированно понимает WebKit в iOS 6 */
        body {
            background-color: #4A525A; /* Тот самый темно-серый фон */
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            color: #FFFFFF;
            text-align: center;
        }

        .login-container {
            width: 280px;
            margin: 50px auto 0 auto;
            padding: 20px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        /* Олдскульные инпуты, похожие на твои */
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 8px;
            background-color: #5B646E;
            border: 1px solid #3A4045;
            color: #FFFFFF;
            font-size: 16px; /* 16px предотвращает авто-зум на iOS */
            border-radius: 4px;
            -webkit-border-radius: 4px; /* Для iOS 6 */
            box-sizing: border-box;
            -webkit-box-sizing: border-box;
        }

        /* Стилизация плейсхолдеров для старого WebKit */
        input::-webkit-input-placeholder {
            color: #A0A5AA;
        }

        /* Кнопка отправки */
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #1F2D3D;
            border: 1px solid #141D27;
            color: #A4B3C6;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            -webkit-border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:active {
            background-color: #141D27;
        }

        /* Блок для вывода ошибок БЕЗ alert() */
        #status-message {
            margin-top: 15px;
            font-size: 14px;
            color: #FF6B6B; /* Красный для ошибок */
            font-weight: bold;
            display: none; /* Изначально скрыт */
        }
        
        #status-message.success {
            color: #2ECC71; /* Зеленый для успеха */
        }
    </style>
</head>
<body>

    <div class="login-container">
        
        <!-- Поля ввода -->
        <div class="input-group">
            <input type="text" id="username" placeholder="Имя пользователя">
        </div>

        <div class="input-group">
            <input type="text" id="email" placeholder="example@mail.name">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="••••••••••••">
        </div>

        <!-- Кнопка -->
        <button type="button" class="btn-submit" id="btn-send">Получить код на почту</button>

        <!-- Текстовое уведомление вместо всплывашек -->
        <div id="status-message"></div>

    </div>

    <script>
        // Старый добрый JavaScript без стрелочных функций (=>), которые ломают iOS 6
        var btnSend = document.getElementById('btn-send');
        var statusMessage = document.getElementById('status-message');

        // Функция показа сообщений прямо на экране
        function showStatus(text, isSuccess) {
            statusMessage.innerText = text;
            statusMessage.style.display = 'block';
            if (isSuccess) {
                statusMessage.className = 'success';
            } else {
                statusMessage.className = '';
            }
        }

        btnSend.onclick = function() {
            var usernameVal = document.getElementById('username').value;
            var emailVal = document.getElementById('email').value;
            var passwordVal = document.getElementById('password').value;

            if (!emailVal) {
                showStatus('Укажите адрес почты', false);
                return;
            }

            showStatus('Отправка запроса...', true);

            // Используем стандартный XMLHttpRequest, так как fetch на iOS 6 не существует!
            var xhr = new XMLHttpRequest();
            
            // Здесь автоматически подхватится адрес воркера/сервера
            xhr.open('POST', window.location.origin + '/api/send-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    try {
                        var response = JSON.parse(xhr.responseText);
                        if (xhr.status === 200 && response.success) {
                            showStatus('Код успешно отправлен на почту!', true);
                            // Здесь можешь добавить переход на страницу ввода кода через пару секунд, если нужно:
                            // setTimeout(function() { window.location.href = 'verify.html'; }, 2000);
                        } else {
                            showStatus(response.error || 'Ошибка сервера', false);
                        }
                    } catch(e) {
                        showStatus('Ошибка ответа сервера', false);
                    }
                }
            };

            var data = JSON.stringify({
                username: usernameVal,
                email: emailVal,
                password: passwordVal
            });

            xhr.send(data);
        };
    </script>

</body>
</html>
