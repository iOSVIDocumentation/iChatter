<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>iChatter - Вход</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
            background-color: #cbd2d9; 
        }
        
        #auth-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            height: 100%; 
        }
        
        .ios-header {
            width: 100%; 
            height: 44px;
            background: linear-gradient(#768da5, #4c647f); 
            border-bottom: 1px solid #2d3e52;
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3); 
            color: #fff; 
        }
        .ios-header h1 { 
            font-size: 19px; 
            margin: 0; 
            font-weight: bold;
            text-shadow: 0 -1px 0 rgba(0,0,0,0.6); 
        }
        
        .ios-section-title {
            width: 90%; 
            max-width: 420px; 
            margin: 25px auto 6px auto;
            color: #4c566c; 
            font-size: 14px; 
            font-weight: bold;
            text-shadow: 0 1px 0 #fff; 
            text-align: left;
            box-sizing: border-box;
            padding-left: 10px;
        }

        .ios-table-view {
            background: #ffffff; 
            border: 1px solid #ababab; 
            border-radius: 10px;
            width: 90%; 
            max-width: 420px; 
            margin: 0 auto; 
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
            display: flex; 
            flex-direction: column;
            box-sizing: border-box;
        }
        
        .ios-input-cell { 
            padding: 12px 15px; 
            border-bottom: 1px solid #cccccc; 
            display: flex; 
            align-items: center;
            background: #ffffff;
        }
        .ios-input-cell:last-child { 
            border-bottom: none; 
        }
        
        .ios-input-cell input { 
            border: none; 
            outline: none; 
            font-size: 16px; 
            width: 100%; 
            background: transparent; 
            color: #000000;
        }
        
        .ios-action-btn {
            width: 90%; 
            max-width: 420px; 
            margin: 20px auto; 
            padding: 12px; 
            font-size: 17px; 
            font-weight: bold; 
            color: #ffffff; 
            background: linear-gradient(#5a7494, #374e6c);
            border: 1px solid #26384f; 
            border-radius: 8px; 
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3), 0 1px 2px rgba(0,0,0,0.2);
            text-shadow: 0 -1px 0 rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .ios-action-btn:active { 
            background: linear-gradient(#374e6c, #26384f); 
        }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="ios-header">
            <h1>iChatter Вход</h1>
        </div>
        
        <!-- Шаг 1: Почта, Никнейм и Пароль -->
        <div id="step-email-block" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <div class="ios-section-title">АВТОРИЗАЦИЯ</div>
            <div class="ios-table-view">
                <div class="ios-input-cell">
                    <!-- Для примера установлена почта example@gmail.com -->
                    <input type="email" id="email-field" value="example@gmail.com" placeholder="Email">
                </div>
                <div class="ios-input-cell">
                    <input type="text" id="username-field" placeholder="Имя пользователя (никнейм)">
                </div>
                <div class="ios-input-cell">
                    <input type="password" id="password-field" placeholder="Пароль доступа">
                </div>
            </div>
            <button class="ios-action-btn" onclick="requestVerificationCode()">Получить код на почту</button>
        </div>

        <!-- Шаг 2: Ввод одноразового кода -->
        <div id="step-code-block" style="width: 100%; display: none; flex-direction: column; align-items: center;">
            <div class="ios-section-title">ПОДТВЕРЖДЕНИЕ ПОЧТЫ</div>
            <div class="ios-table-view">
                <div class="ios-input-cell">
                    <input type="text" id="code-field" placeholder="Введите 6-значный код">
                </div>
            </div>
            <button class="ios-action-btn" onclick="submitVerificationCode()">Войти в мессенджер</button>
        </div>
    </div>

    <script>
        function requestVerificationCode() {
            const email = document.getElementById('email-field').value.trim();
            const username = document.getElementById('username-field').value.trim();
            const password = document.getElementById('password-field').value;
            
            if (!email) return alert('Пожалуйста, заполните поле Email!');
            if (!username) return alert('Пожалуйста, введите никнейм!');
            if (!password) return alert('Пожалуйста, введите пароль!');

            // Отправляем все три поля на твой сервер в Termux
            fetch('/api/send-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) return alert(data.error);
                
                alert("Данные верны! Код отправлен на ваш почтовый ящик.");
                document.getElementById('step-email-block').style.display = 'none';
                document.getElementById('step-code-block').style.display = 'flex';
            })
            .catch(err => {
                alert("Ошибка: Сервер не отвечает.");
            });
        }

        function submitVerificationCode() {
            const email = document.getElementById('email-field').value.trim();
            const code = document.getElementById('code-field').value.trim();
            const username = document.getElementById('username-field').value.trim();

            if (!code) return alert('Введите код авторизации!');

            fetch('/api/verify-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code, username })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) return alert(data.error);
                
                localStorage.setItem('userId', data.user.id);
                localStorage.setItem('userData', JSON.stringify(data.user));
                
                alert("Вход успешно выполнен!");
                window.location.href = '/chat';
            })
            .catch(err => {
                alert("Ошибка обработки подтверждения кода.");
            });
        }
    </script>
</body>
</html>
