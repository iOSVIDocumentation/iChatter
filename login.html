<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter - Вход</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background: #555d65; font-family: Helvetica, sans-serif; }
        .wrapper { display: table; width: 100%; height: 100%; }
        .cell { display: table-cell; vertical-align: middle; text-align: center; }
        .login-box { background: #3b434a; padding: 20px; border-radius: 8px; width: 280px; margin: 0 auto; color: white; box-sizing: border-box; }
        .lang-switch { text-align: right; margin-bottom: 10px; }
        .lang-switch button { background: #4a627a; color: white; border: none; padding: 4px 10px; border-radius: 3px; font-size: 12px; cursor: pointer; }
        .tabs { margin-bottom: 15px; }
        .tab-btn { width: 48%; padding: 8px 0; background: #2c3e50; color: #aaa; border: none; cursor: pointer; border-radius: 4px; font-size: 14px; }
        .tab-btn.active { background: #4a627a; color: white; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: none; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .action-btn { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 16px; margin-top: 10px; }
        #code-section { background: #2c3e50; padding: 10px; border-radius: 4px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="cell">
            <div class="login-box">
                <div class="lang-switch">
                    <button onclick="switchLang()" id="lang-btn">EN</button>
                </div>
                <div class="tabs">
                    <button id="tab-login" class="tab-btn active" onclick="setMode('login')">Вход</button>
                    <button id="tab-register" class="tab-btn" onclick="setMode('register')">Регистрация</button>
                </div>
                <input type="email" id="email" placeholder="Почта">
                <input type="text" id="username" placeholder="Имя пользователя" style="display:none;">
                <input type="password" id="password" placeholder="Пароль">
                <button id="main-btn" class="action-btn" onclick="sendCode()">Войти</button>
                <div id="code-section">
                    <p id="code-text">Код отправлен на почту</p>
                    <input type="text" id="code" placeholder="Код из письма">
                    <button class="action-btn" style="background: #2980b9;" onclick="verifyCode()">Подтвердить</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Для всех устройств, кроме старых iOS, используем новый туннель
        var API = 'https://here-valium-discussion-theory.trycloudflare.com';
        var currentMode = 'login';
        var currentLang = 'ru';

        function isOldIOS() {
            var ua = navigator.userAgent;
            var match = ua.match(/iPhone OS (\d+)_/);
            return match && parseInt(match[1]) < 10;
        }

        var texts = {
            ru: {
                login: 'Вход', register: 'Регистрация', email: 'Почта', username: 'Имя пользователя',
                password: 'Пароль', enter: 'Войти', regBtn: 'Зарегистрироваться',
                codeSent: 'Код отправлен на почту', codePlaceholder: 'Код из письма', confirm: 'Подтвердить',
                fillAll: 'Заполните все поля', enterCode: 'Введите код', wrongCode: 'Неверный код', error: 'Ошибка'
            },
            en: {
                login: 'Login', register: 'Register', email: 'Email', username: 'Username',
                password: 'Password', enter: 'Login', regBtn: 'Register',
                codeSent: 'Code sent to email', codePlaceholder: 'Code from email', confirm: 'Confirm',
                fillAll: 'Fill all fields', enterCode: 'Enter code', wrongCode: 'Wrong code', error: 'Error'
            }
        };

        function t(key) { return texts[currentLang][key] || key; }

        function switchLang() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            document.getElementById('lang-btn').innerHTML = currentLang === 'ru' ? 'EN' : 'RU';
            updateUI();
        }

        function updateUI() {
            document.getElementById('tab-login').innerHTML = t('login');
            document.getElementById('tab-register').innerHTML = t('register');
            document.getElementById('email').placeholder = t('email');
            document.getElementById('username').placeholder = t('username');
            document.getElementById('password').placeholder = t('password');
            document.getElementById('main-btn').innerHTML = currentMode === 'login' ? t('enter') : t('regBtn');
            document.getElementById('code-text').innerHTML = t('codeSent');
            document.getElementById('code').placeholder = t('codePlaceholder');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('code-section').style.display = 'none';
            if (mode === 'register') {
                document.getElementById('tab-register').className = 'tab-btn active';
                document.getElementById('tab-login').className = 'tab-btn';
                document.getElementById('username').style.display = 'block';
                document.getElementById('main-btn').innerHTML = t('regBtn');
            } else {
                document.getElementById('tab-login').className = 'tab-btn active';
                document.getElementById('tab-register').className = 'tab-btn';
                document.getElementById('username').style.display = 'none';
                document.getElementById('main-btn').innerHTML = t('enter');
            }
        }

        function sendCode() {
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;
            var username = document.getElementById('username').value.trim();
            if (!email || !password || (currentMode === 'register' && !username)) {
                alert(t('fillAll'));
                return;
            }
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API + '/api/send-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    var data = {};
                    try { data = JSON.parse(xhr.responseText); } catch(e) {}
                    if (xhr.status === 200 && data.success) {
                        document.getElementById('code-section').style.display = 'block';
                    } else {
                        alert(data.error || t('error'));
                    }
                }
            };
            xhr.send(JSON.stringify({ email: email, password: password, username: username, mode: currentMode, language: currentLang }));
        }

        function verifyCode() {
            var email = document.getElementById('email').value.trim();
            var code = document.getElementById('code').value.trim();
            if (!code) { alert(t('enterCode')); return; }
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API + '/api/verify-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    var data = {};
                    try { data = JSON.parse(xhr.responseText); } catch(e) {}
                    if (xhr.status === 200 && data.success) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('email', email);
                        localStorage.setItem('lang', currentLang);

                        // iOS 6 сразу на локальный HTTP
                        if (isOldIOS()) {
                            window.location.href = 'http://192.168.1.7:8080/chat.html?token=' + data.token + '&email=' + encodeURIComponent(email);
                        } else {
                            window.location.href = 'chat.html?token=' + data.token + '&email=' + encodeURIComponent(email);
                        }
                    } else {
                        alert(data.error || t('wrongCode'));
                    }
                }
            };
            xhr.send(JSON.stringify({ email: email, code: code, device: 'Web' }));
        }
    </script>
</body>
</html>
