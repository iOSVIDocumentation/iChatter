<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #16213e; padding: 30px 25px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 10px; background: #0f3460; color: #aaa; border: none; cursor: pointer; font-size: 14px; border-radius: 6px; transition: 0.2s; }
        .tabs button.active { background: #0088cc; color: #fff; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #fff; font-size: 14px; outline: none; }
        input:focus { border-color: #0088cc; }
        .btn { width: 100%; padding: 12px; background: #0088cc; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: #00a8ff; }
        #code-box { display: none; background: #0f3460; padding: 15px; border-radius: 8px; margin-top: 15px; }
        #code-box p { margin-bottom: 10px; font-size: 13px; color: #ccc; }
        .lang-row { text-align: right; margin-bottom: 10px; }
        .lang-row button { background: #0f3460; color: #ccc; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="lang-row">
            <button onclick="switchLang()" id="langBtn">EN</button>
        </div>
        <div class="tabs">
            <button id="tabLogin" class="active" onclick="setMode('login')">Вход</button>
            <button id="tabReg" onclick="setMode('register')">Регистрация</button>
        </div>
        <input type="email" id="email" placeholder="Email">
        <input type="text" id="username" placeholder="Имя" style="display:none;">
        <input type="password" id="password" placeholder="Пароль">
        <button class="btn" id="mainBtn" onclick="sendCode()">Войти</button>
        <div id="code-box">
            <p>Код отправлен на почту</p>
            <input type="text" id="code" placeholder="Код">
            <button class="btn" style="background:#27ae60;" onclick="verifyCode()">Подтвердить</button>
        </div>
    </div>

    <script>
        var API = 'https://moss-perspective-stands-copying.trycloudflare.com';
        var mode = 'login';
        var lang = 'ru';
        var t = {
            ru: { login: 'Вход', reg: 'Регистрация', email: 'Email', name: 'Имя', pass: 'Пароль', enter: 'Войти', regBtn: 'Зарегистрироваться', codeSent: 'Код отправлен на почту', code: 'Код', confirm: 'Подтвердить', fill: 'Заполните все поля', wrong: 'Неверный код', err: 'Ошибка' },
            en: { login: 'Login', reg: 'Register', email: 'Email', name: 'Name', pass: 'Password', enter: 'Login', regBtn: 'Register', codeSent: 'Code sent', code: 'Code', confirm: 'Confirm', fill: 'Fill all fields', wrong: 'Wrong code', err: 'Error' }
        };
        function _(k) { return t[lang][k]; }
        function switchLang() { lang = lang === 'ru' ? 'en' : 'ru'; document.getElementById('langBtn').innerText = lang === 'ru' ? 'EN' : 'RU'; updateUI(); }
        function updateUI() {
            document.getElementById('tabLogin').innerText = _('login');
            document.getElementById('tabReg').innerText = _('reg');
            document.getElementById('email').placeholder = _('email');
            document.getElementById('username').placeholder = _('name');
            document.getElementById('password').placeholder = _('pass');
            document.getElementById('mainBtn').innerText = mode === 'login' ? _('enter') : _('regBtn');
        }
        function setMode(m) {
            mode = m;
            document.getElementById('code-box').style.display = 'none';
            document.getElementById('tabLogin').className = m === 'login' ? 'active' : '';
            document.getElementById('tabReg').className = m === 'register' ? 'active' : '';
            document.getElementById('username').style.display = m === 'register' ? 'block' : 'none';
            updateUI();
        }
        function sendCode() {
            var email = document.getElementById('email').value.trim();
            var pass = document.getElementById('password').value;
            var name = document.getElementById('username').value.trim();
            if (!email || !pass || (mode === 'register' && !name)) { alert(_('fill')); return; }
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API + '/api/send-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                var d = JSON.parse(xhr.responseText || '{}');
                if (xhr.status === 200 && d.success) document.getElementById('code-box').style.display = 'block';
                else alert(d.error || _('err'));
            };
            xhr.send(JSON.stringify({ email: email, password: pass, username: name, mode: mode, language: lang }));
        }
        function verifyCode() {
            var email = document.getElementById('email').value.trim();
            var code = document.getElementById('code').value.trim();
            if (!code) { alert(_('fill')); return; }
            var xhr = new XMLHttpRequest();
            xhr.open('POST', API + '/api/verify-code', true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onload = function() {
                var d = JSON.parse(xhr.responseText || '{}');
                if (xhr.status === 200 && d.success) {
                    localStorage.setItem('token', d.token);
                    localStorage.setItem('email', email);
                    localStorage.setItem('lang', lang);
                    window.location.href = 'chat.html';
                } else alert(d.error || _('wrong'));
            };
            xhr.send(JSON.stringify({ email: email, code: code, device: 'Web' }));
        }
    </script>
</body>
</html>
