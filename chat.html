<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter</title>
    <script src="https://moss-perspective-stands-copying.trycloudflare.com/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #E2E7ED; font-family: Helvetica, sans-serif; overflow: hidden; }
        #header { position: absolute; top: 0; left: 0; right: 0; height: 44px; background: #2c3e50; color: white; line-height: 44px; padding: 0 10px; z-index: 10; box-sizing: border-box; }
        #header button { float: left; margin-top: 7px; margin-right: 10px; background: #4a627a; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
        #contacts-panel { position: absolute; top: 44px; bottom: 0; left: 0; width: 100%; background: white; overflow-y: scroll; -webkit-overflow-scrolling: touch; z-index: 5; display: none; }
        .contact-item { padding: 12px 10px; border-bottom: 1px solid #eee; cursor: pointer; }
        .contact-item .name { font-weight: bold; }
        .contact-item .status { font-size: 12px; color: #888; }
        .contact-item .status.online { color: #27ae60; }
        #add-contact { padding: 10px; border-bottom: 1px solid #ccc; background: #f5f5f5; }
        #add-contact input { width: 58%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        #add-contact button { width: 30%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 14px; }
        #messages { position: absolute; top: 44px; bottom: 50px; left: 0; right: 0; padding: 10px; overflow-y: scroll; -webkit-overflow-scrolling: touch; box-sizing: border-box; }
        .msg { padding: 8px 10px; background: white; margin-bottom: 6px; border-radius: 8px; word-wrap: break-word; font-size: 14px; }
        .msg.my { background: #dcf8c6; }
        .msg .sender { font-weight: bold; font-size: 12px; color: #555; }
        .msg .time { font-size: 10px; color: #999; margin-left: 5px; }
        .msg .text { margin-top: 3px; }
        #form-container { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: #cbd2d9; box-sizing: border-box; padding: 5px; }
        #form { display: block; width: 100%; height: 100%; margin: 0; }
        #input { position: absolute; left: 5px; top: 5px; bottom: 5px; right: 80px; width: auto; box-sizing: border-box; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; padding: 5px; }
        #send-btn { position: absolute; right: 5px; top: 5px; bottom: 5px; width: 70px; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="header">
        <button onclick="toggleContacts()">☰</button>
        <span id="chat-title">Выберите контакт</span>
    </div>
    <div id="contacts-panel">
        <div id="add-contact">
            <input type="text" id="search-input" placeholder="ID пользователя">
            <button onclick="addContact()">Найти</button>
        </div>
        <div id="contacts-list"></div>
    </div>
    <div id="messages"></div>
    <div id="form-container">
        <form id="form">
            <input id="input" autocomplete="off" placeholder="Сообщение...">
            <button type="submit" id="send-btn">Отпр.</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
