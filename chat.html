<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter</title>
    <script src="https://moss-perspective-stands-copying.trycloudflare.com/socket.io/socket.io.js"></script>
    <style>
        /* Базовые (светлые) стили */
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #E2E7ED; color: #222;
            font-family: Helvetica, sans-serif; overflow: hidden;
        }
        #header {
            position: absolute; top: 0; left: 0; right: 0; height: 44px;
            background: #2c3e50; color: white; line-height: 44px;
            padding: 0 10px; z-index: 10; box-sizing: border-box;
        }
        #header button {
            float: left; margin-top: 7px; margin-right: 6px;
            background: #4a627a; color: white; border: none;
            padding: 5px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
        }
        #chat-title {
            font-size: 14px; font-weight: bold; display: inline-block;
            max-width: 50%; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; vertical-align: middle;
        }
        #chats-panel, #archive-panel, #settings-panel {
            position: absolute; top: 44px; bottom: 0; left: 0; width: 100%;
            background: white; overflow-y: scroll;
            -webkit-overflow-scrolling: touch; z-index: 5; display: none;
        }
        .panel-section {
            padding: 10px; border-bottom: 1px solid #ccc;
            background: #f5f5f5;
        }
        .panel-section input { width: 58%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .panel-section button { width: 30%; padding: 8px; background: #2c3e50; color: white; border: none; border-radius: 4px; font-size: 14px; }
        .chat-item {
            padding: 12px 10px; border-bottom: 1px solid #eee;
            cursor: pointer; position: relative;
        }
        .chat-item .name { font-weight: bold; }
        .chat-item .status { font-size: 12px; color: #888; }
        .chat-item .status.online { color: #27ae60; }
        .chat-item .archive-btn {
            position: absolute; right: 10px; top: 12px;
            background: #e74c3c; color: white; border: none;
            padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer;
        }
        .chat-item .unarchive-btn { background: #27ae60; }
        #messages {
            position: absolute; top: 44px; bottom: 0; left: 0; right: 0;
            padding: 10px; overflow-y: scroll;
            -webkit-overflow-scrolling: touch; box-sizing: border-box;
            background: #E2E7ED;
        }
        .msg {
            padding: 8px 10px; background: white; margin-bottom: 6px;
            border-radius: 8px; word-wrap: break-word; font-size: 14px;
            position: relative; max-width: 80%;
        }
        .msg.my {
            background: #dcf8c6; margin-left: 20%;
        }
        .msg .sender { font-weight: bold; font-size: 12px; color: #555; }
        .msg .time { font-size: 10px; color: #999; margin-left: 5px; }
        .msg .text { margin-top: 3px; }
        .msg .edited-tag { font-size: 10px; color: #888; font-style: italic; }
        .msg .actions { display: none; position: absolute; right: 5px; top: 5px; }
        .msg .actions button {
            font-size: 10px; padding: 2px 5px; margin-left: 3px;
            border: none; border-radius: 3px; cursor: pointer; color: white;
        }
        .msg .actions .edit-btn { background: #f39c12; }
        .msg .actions .del-btn { background: #e74c3c; }
        #form-container {
            position: absolute; bottom: 0; left: 0; right: 0; height: 50px;
            background: #cbd2d9; box-sizing: border-box;
            padding: 5px; display: none;
        }
        #form { display: block; width: 100%; height: 100%; margin: 0; }
        #input {
            position: absolute; left: 5px; top: 5px; bottom: 5px;
            right: 80px; width: auto; box-sizing: border-box;
            font-size: 16px; border-radius: 4px; border: 1px solid #ccc;
            padding: 5px; background: white; color: #222;
        }
        #send-btn {
            position: absolute; right: 5px; top: 5px; bottom: 5px; width: 70px;
            background: #2c3e50; color: white; border: none;
            border-radius: 4px; font-size: 14px; cursor: pointer;
        }
        .settings-row { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .settings-row label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; }
        .settings-row input, .settings-row select {
            width: 100%; padding: 8px; border: 1px solid #ccc;
            border-radius: 4px; font-size: 14px; box-sizing: border-box;
            background: white; color: #222;
        }
        .settings-row button {
            width: 100%; padding: 10px; background: #27ae60;
            color: white; border: none; border-radius: 4px;
            font-size: 15px; cursor: pointer;
        }
        .avatar-grid { overflow: hidden; }
        .avatar-grid img {
            width: 44px; height: 44px; border-radius: 22px;
            margin: 4px; border: 2px solid transparent;
            cursor: pointer; float: left;
        }
        .avatar-grid img.selected { border-color: #27ae60; }
        .wallpaper-grid { overflow: hidden; }
        .wallpaper-grid img {
            width: 70px; height: 44px; margin: 4px;
            border: 2px solid transparent; cursor: pointer;
            object-fit: cover; float: left;
        }
        .wallpaper-grid img.selected { border-color: #27ae60; }

        /* === ТЁМНАЯ ТЕМА === */
        body.dark-mode {
            background: #1a1a2e; color: #ddd;
        }
        body.dark-mode #header {
            background: #0f3460;
        }
        body.dark-mode #chats-panel,
        body.dark-mode #archive-panel,
        body.dark-mode #settings-panel {
            background: #16213e; color: #ddd;
        }
        body.dark-mode .panel-section {
            background: #1a1a2e; border-color: #0f3460;
        }
        body.dark-mode .panel-section input {
            background: #0f3460; border-color: #333; color: #ddd;
        }
        body.dark-mode .chat-item {
            border-color: #0f3460;
        }
        body.dark-mode .chat-item .status { color: #aaa; }
        body.dark-mode .chat-item .status.online { color: #4cd964; }
        body.dark-mode #messages {
            background: #1a1a2e;
        }
        body.dark-mode .msg {
            background: #0f3460; color: #ddd;
        }
        body.dark-mode .msg.my {
            background: #0088cc;
        }
        body.dark-mode .msg .sender { color: #bbb; }
        body.dark-mode .msg .time { color: #999; }
        body.dark-mode .msg .edited-tag { color: #aaa; }
        body.dark-mode #form-container {
            background: #0f3460; border-top: 1px solid #1a1a2e;
        }
        body.dark-mode #input {
            background: #0f3460; border-color: #333; color: #ddd;
        }
        body.dark-mode #send-btn {
            background: #0088cc;
        }
        body.dark-mode .settings-row {
            border-color: #0f3460;
        }
        body.dark-mode .settings-row input,
        body.dark-mode .settings-row select {
            background: #0f3460; border-color: #333; color: #ddd;
        }
        body.dark-mode .settings-row button {
            background: #27ae60;
        }
        body.dark-mode .avatar-grid img.selected {
            border-color: #4cd964;
        }
        body.dark-mode .wallpaper-grid img.selected {
            border-color: #4cd964;
        }
    </style>
</head>
<body class="dark-mode">
    <!-- Шапка -->
    <div id="header">
        <button onclick="showPanel('chats')">Чаты</button>
        <button onclick="showPanel('archive')">Архив</button>
        <button onclick="showPanel('settings')">Настр.</button>
        <span id="chat-title">iChatter</span>
    </div>

    <!-- Панель чатов -->
    <div id="chats-panel">
        <div class="panel-section">
            <input type="text" id="search-input" placeholder="Ник пользователя">
            <button onclick="findUser()">Найти</button>
        </div>
        <div id="chats-list"></div>
    </div>

    <!-- Панель архива -->
    <div id="archive-panel">
        <div style="padding:10px;font-weight:bold;border-bottom:1px solid #ccc;">Архивные чаты</div>
        <div id="archive-list"></div>
    </div>

    <!-- Панель настроек -->
    <div id="settings-panel">
        <div style="padding:10px;font-weight:bold;border-bottom:1px solid #ccc;">Настройки</div>
        <div class="settings-row">
            <label>Язык / Language</label>
            <select id="lang-select" onchange="setLang(this.value)">
                <option value="ru">Русский</option>
                <option value="en">English</option>
            </select>
        </div>
        <div class="settings-row">
            <label>Тема</label>
            <select id="theme-select" onchange="setTheme(this.value)">
                <option value="light">Светлая</option>
                <option value="dark">Тёмная</option>
            </select>
        </div>
        <div class="settings-row">
            <label>Обои чата</label>
            <div class="wallpaper-grid" id="wallpaper-grid"></div>
        </div>
        <div class="settings-row">
            <label>Ник (не меняется)</label>
            <input type="text" id="set-username" disabled style="background:#ddd; color:#555;">
        </div>
        <div class="settings-row">
            <label>Отображаемое имя</label>
            <input type="text" id="set-displayname" placeholder="Как вас видят другие">
        </div>
        <div class="settings-row">
            <label>Возраст</label>
            <input type="number" id="set-age" placeholder="Возраст" min="0" max="150">
        </div>
        <div class="settings-row">
            <label>О себе</label>
            <input type="text" id="set-about" placeholder="Расскажите о себе">
        </div>
        <div class="settings-row">
            <label>Аватар</label>
            <div class="avatar-grid" id="avatar-grid"></div>
        </div>
        <div class="settings-row">
            <label>Устройства</label>
            <div id="devices-list"></div>
        </div>
        <div class="settings-row">
            <button onclick="saveSettings()">Сохранить</button>
        </div>
    </div>

    <!-- Сообщения -->
    <div id="messages"></div>

    <!-- Форма ввода -->
    <div id="form-container">
        <form id="form" onsubmit="return false;">
            <input id="input" autocomplete="off" placeholder="Сообщение...">
            <button type="button" id="send-btn" onclick="sendMessage()">Отпр.</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
