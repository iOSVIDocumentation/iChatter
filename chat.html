<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChatter</title>
    <script>
        if (navigator.userAgent.match(/iPhone OS (\d+)_/) && parseInt(RegExp.$1) < 10 && location.protocol === 'https:') {
            location.href = 'http://192.168.1.14:8080' + location.pathname + location.search;
        }
    </script>
    <script src="https://merry-universal-manually-suspected.trycloudflare.com/socket.io/socket.io.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #555d65; color: #fff; font-family: Helvetica, sans-serif; overflow: hidden; }
        body.light-mode { background: #E2E7ED; color: #222; }
        body.light-mode #header { background: #2c3e50; }
        body.light-mode #chats-panel, body.light-mode #archive-panel, body.light-mode #settings-panel { background: white; }
        body.light-mode #messages { background: #E2E7ED; }
        body.light-mode .panel-section { background: #f5f5f5; border-color: #ddd; }
        body.light-mode .panel-section input { background: white; color: #222; }
        body.light-mode .chat-item { border-color: #eee; }
        body.light-mode .msg { background: white; color: #222; }
        body.light-mode .msg.my { background: #dcf8c6; color: #222; }
        body.light-mode .msg .sender { color: #555; }
        body.light-mode .msg .time { color: #999; }
        body.light-mode #form-container { background: #cbd2d9; }
        body.light-mode .settings-row { border-color: #eee; }
        body.light-mode .settings-row input, .settings-row select { background: white; color: #222; }
        body.light-mode #bottom-nav { background: #cbd2d9; }
        body.light-mode .nav-btn { background: #2c3e50; border-color: #ccc; }
        body.light-mode .nav-btn.active { background: #4a627a; }

        #header { position: absolute; top: 0; left: 0; right: 0; height: 44px; background: #2c3e50; color: white; line-height: 44px; padding: 0 10px; z-index: 10; box-sizing: border-box; }
        #btn-back { background: #4a627a; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-right: 8px; display: none; }
        #chat-title { font-size: 14px; font-weight: bold; display: inline; cursor: pointer; vertical-align: middle; }
        #main-content { position: absolute; top: 44px; bottom: 50px; left: 0; right: 0; overflow: hidden; }
        #chats-panel, #archive-panel, #settings-panel, #chat-area { position: absolute; top: 0; bottom: 0; left: 0; width: 100%; background: #3b434a; overflow-y: scroll; -webkit-overflow-scrolling: touch; z-index: 2; display: none; }
        #messages { position: absolute; top: 0; left: 0; right: 0; bottom: 50px; padding: 10px; overflow-y: scroll; -webkit-overflow-scrolling: touch; box-sizing: border-box; background: #555d65; }
        #form-container { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: #3b434a; box-sizing: border-box; padding: 5px; display: block; }
        #form { position: relative; width: 100%; height: 100%; }
        #input { position: absolute; left: 0; top: 5px; bottom: 5px; right: 75px; width: auto; box-sizing: border-box; font-size: 16px; border-radius: 4px; border: none; padding: 5px; background: white; color: #222; }
        #send-btn { position: absolute; right: 0; top: 5px; bottom: 5px; width: 70px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .panel-section { padding: 10px; border-bottom: 1px solid #4a627a; background: #2c3e50; }
        .panel-section input { width: 58%; padding: 8px; border: none; border-radius: 4px; font-size: 14px; background: white; color: #222; }
        .panel-section button { width: 30%; padding: 8px; background: #4a627a; color: white; border: none; border-radius: 4px; font-size: 14px; }
        .chat-item { padding: 12px 10px; border-bottom: 1px solid #4a627a; cursor: pointer; position: relative; }
        .chat-item .name { font-weight: bold; }
        .chat-item .status { font-size: 12px; color: #aaa; }
        .chat-item .status.online { color: #4cd964; }
        .chat-item .archive-btn { position: absolute; right: 10px; top: 12px; background: #e74c3c; color: white; border: none; padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; }
        .chat-item .unarchive-btn { background: #27ae60; }
        .msg { padding: 8px 10px; background: #2c3e50; margin-bottom: 6px; border-radius: 8px; word-wrap: break-word; font-size: 14px; position: relative; max-width: 80%; color: #fff; }
        .msg.my { background: #27ae60; margin-left: 20%; color: #fff; }
        .msg .sender { font-weight: bold; font-size: 12px; color: #ccc; }
        .msg .time { font-size: 10px; color: #aaa; margin-left: 5px; }
        .msg .text { margin-top: 3px; }
        .msg .edited-tag { font-size: 10px; color: #ddd; font-style: italic; }
        .msg .actions { display: none; position: absolute; right: 5px; top: 5px; }
        .msg .actions button { font-size: 10px; padding: 2px 5px; margin-left: 3px; border: none; border-radius: 3px; cursor: pointer; color: white; }
        .msg .actions .edit-btn { background: #f39c12; }
        .msg .actions .del-btn { background: #e74c3c; }
        .settings-row { padding: 12px 10px; border-bottom: 1px solid #4a627a; }
        .settings-row label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 13px; }
        .settings-row input, .settings-row select { width: 100%; padding: 8px; border: none; border-radius: 4px; font-size: 14px; box-sizing: border-box; background: white; color: #222; }
        .settings-row button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
        .avatar-grid { overflow: hidden; }
        .avatar-grid img { width: 44px; height: 44px; border-radius: 22px; margin: 4px; border: 2px solid transparent; cursor: pointer; float: left; }
        .avatar-grid img.selected { border-color: #27ae60; }
        .wallpaper-grid { overflow: hidden; }
        .wallpaper-grid img { width: 70px; height: 44px; margin: 4px; border: 2px solid transparent; cursor: pointer; object-fit: cover; float: left; }
        .wallpaper-grid img.selected { border-color: #27ae60; }
        #bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 50px; background: #3b434a; display: table; width: 100%; z-index: 20; }
        .nav-btn { display: table-cell; text-align: center; vertical-align: middle; background: #2c3e50; color: #aaa; font-size: 12px; cursor: pointer; border-right: 1px solid #4a627a; }
        .nav-btn:last-child { border-right: none; }
        .nav-btn.active { background: #4a627a; color: white; font-weight: bold; }

        #partner-profile-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); z-index: 9999; display: none; justify-content: center; align-items: center; }
        #partner-profile-box { background: #3b434a; color: white; width: 280px; padding: 20px; border-radius: 12px; text-align: center; position: relative; margin: 50px auto 0; }
        #partner-profile-box img { width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; }
        #partner-profile-box .close-btn { position: absolute; top: 10px; right: 15px; font-size: 20px; cursor: pointer; color: #aaa; }
        .partner-detail { margin: 8px 0; font-size: 14px; }
    </style>
</head>
<body class="dark-mode">
    <div id="header">
        <button id="btn-back" onclick="goBack()">← Назад</button>
        <span id="chat-title">iChatter</span>
    </div>

    <div id="main-content">
        <div id="chats-panel">
            <div class="panel-section">
                <input type="text" id="search-input" placeholder="Введите ID (6 цифр)">
                <button onclick="findUser()">Найти</button>
            </div>
            <div id="chats-list"></div>
        </div>

        <div id="archive-panel">
            <div style="padding:10px;font-weight:bold;border-bottom:1px solid #4a627a;">Архивные чаты</div>
            <div id="archive-list"></div>
        </div>

        <div id="settings-panel">
            <div style="padding:10px;font-weight:bold;border-bottom:1px solid #4a627a;">Настройки</div>
            <div class="settings-row">
                <label>Язык / Language</label>
                <select id="lang-select" onchange="setLang(this.value)">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Тема</label>
                <select id="theme-select" onchange="setTheme(this.value)">
                    <option value="dark">Тёмная</option>
                    <option value="light">Светлая</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Обои чата</label>
                <div class="wallpaper-grid" id="wallpaper-grid"></div>
            </div>
            <div class="settings-row">
                <label>Ник (не меняется)</label>
                <input type="text" id="set-username" disabled style="background:#ccc; color:#555;">
            </div>
            <div class="settings-row">
                <label>Отображаемое имя</label>
                <input type="text" id="set-displayname" placeholder="Как вас видят другие">
            </div>
            <div class="settings-row">
                <label>Возраст</label>
                <input type="number" id="set-age" placeholder="Возраст" min="0" max="150">
            </div>
            <div class="settings-row">
                <label>О себе</label>
                <input type="text" id="set-about" placeholder="Расскажите о себе">
            </div>
            <div class="settings-row">
                <label>Аватар</label>
                <div class="avatar-grid" id="avatar-grid"></div>
                <button class="upload-btn" style="margin-top:5px; background:#4a627a; color:white; border:none; padding:8px; border-radius:4px;" onclick="document.getElementById('avatar-file').click()">Загрузить свой аватар</button>
                <input type="file" id="avatar-file" accept="image/*" style="display:none;" onchange="uploadCustomAvatar(this)">
            </div>
            <div class="settings-row">
                <label>Мой ID: <b id="my-id-display">...</b></label>
            </div>
            <div class="settings-row">
                <label>Устройства</label>
                <div id="devices-list"></div>
            </div>
            <div class="settings-row">
                <button onclick="saveSettings()">Сохранить</button>
            </div>
        </div>

        <div id="chat-area">
            <div id="messages"></div>
            <div id="form-container">
                <form id="form" onsubmit="return false;">
                    <input id="input" autocomplete="off" placeholder="Сообщение...">
                    <button type="button" id="send-btn" onclick="sendMessage()">Отпр.</button>
                </form>
            </div>
        </div>
    </div>

    <div id="bottom-nav">
        <div class="nav-btn active" id="nav-chats" onclick="showTab('chats')">Чаты</div>
        <div class="nav-btn" id="nav-archive" onclick="showTab('archive')">Архив</div>
        <div class="nav-btn" id="nav-settings" onclick="showTab('settings')">Настр.</div>
    </div>

    <div id="partner-profile-overlay" onclick="closePartnerProfile()">
        <div id="partner-profile-box" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="closePartnerProfile()">×</span>
            <img id="partner-avatar" src="" alt="Avatar">
            <div class="partner-detail"><b id="partner-displayname"></b></div>
            <div class="partner-detail">@<span id="partner-username"></span></div>
            <div class="partner-detail">ID: <span id="partner-id"></span></div>
            <div class="partner-detail" id="partner-status"></div>
            <div class="partner-detail" id="partner-age"></div>
            <div class="partner-detail" id="partner-about"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
