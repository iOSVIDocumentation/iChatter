<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>iChatter OS 6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: #4A525A; color: #fff; font-family: Helvetica; margin: 0; padding: 0; }
        .sidebar { width: 300px; background: #383E44; border-right: 1px solid #000; }
        .menu-btn { padding: 10px; width: 100%; border: none; background: #2B3035; color: #fff; text-align: left; cursor: pointer; }
        .modal { display: none; position: absolute; top: 10px; left: 10px; width: 280px; background: #383E44; border: 2px solid #fff; padding: 15px; z-index: 9999; }
        input, select, textarea { width: 90%; margin-bottom: 10px; padding: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="menu-btn" onclick="showModal('settings')">⚙️ Настройки</button>
    <button class="menu-btn" onclick="showModal('search')">🔍 Поиск по нику</button>
    <button class="menu-btn" onclick="archiveChat()">📁 Архив</button>
    <div id="chat-list"></div>
</div>

<!-- Модальное окно: НАСТРОЙКИ -->
<div id="settings" class="modal">
    <h3>Настройки профиля</h3>
    <p>Ваш ник:</p>
    <input id="p-name" placeholder="Введите ваш ник">
    <input id="p-age" placeholder="Возраст">
    <textarea id="p-about" placeholder="О себе"></textarea>
    <select id="theme" onchange="changeTheme()">
        <option value="dark">Темная тема</option>
        <option value="light">Светлая тема</option>
    </select>
    <button onclick="saveSettings()">Сохранить</button>
    <button onclick="hideAll()">Закрыть</button>
</div>

<!-- Модальное окно: ПОИСК -->
<div id="search" class="modal">
    <h3>Поиск пользователя</h3>
    <input id="search-input" placeholder="Введите ник">
    <button onclick="findUser()">Найти</button>
    <button onclick="hideAll()">Закрыть</button>
</div>

<script>
    // Загружаем ник при открытии
    var savedName = localStorage.getItem('username');
    if (savedName) {
        document.getElementById('p-name').value = savedName;
    }

    function findUser() {
        var query = document.getElementById('search-input').value;
        if(query) alert("Ищем пользователя с ником: " + query);
        hideAll();
    }

    function saveSettings() {
        var name = document.getElementById('p-name').value;
        localStorage.setItem('username', name);
        localStorage.setItem('age', document.getElementById('p-age').value);
        alert('Данные сохранены для ника: ' + name);
        hideAll();
    }

    function archiveChat() {
        alert('Чат перемещен в архив');
    }

    function changeTheme() {
        var isLight = document.getElementById('theme').value === 'light';
        document.body.style.background = isLight ? '#f0f0f0' : '#4A525A';
        document.body.style.color = isLight ? '#000' : '#fff';
    }

    function showModal(id) { document.getElementById(id).style.display = 'block'; }
    function hideAll() { 
        document.getElementById('settings').style.display = 'none'; 
        document.getElementById('search').style.display = 'none'; 
    }
</script>
</body>
</html>
